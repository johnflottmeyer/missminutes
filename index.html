<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Miss Minutes</title>
<link rel="stylesheet" href="styles.css" />
</head>

<body>

<div id="character">
	<div class="clockparts">
		<div class="one"></div>
<div class="onehalf"></div>
		<div class="two"></div>
		<div class="three"></div>
		<div class="four"></div>
		<div class="fourhalf"></div>
		<div class="five"></div>
		<div class="six"></div>
		<div class="seven"></div>
		<div class="sevenhalf"></div>
		<div class="eight"></div>
		<div class="nine"></div>
		<div class="ten"></div>
		<div class="tenhalf"></div>
		<div class="eleven"></div>
		<div class="twelve"></div>
	</div>
<div class="arm left-arm">
    <div class="upper-arm">
        <div class="lower-arm">
            <div class="hand">
    <div class="palm"></div>

    <div class="finger finger1"></div>
    <div class="finger finger2"></div>
    <div class="finger finger3"></div>
    <div class="finger finger4"></div>

    <div class="thumb"></div>
</div>
        </div>
    </div>
</div>
	<div class="face">
		<div class="eyes">
			<div class="eye">
<div class="topeyelid">
				<div class="eyelash">
					<span></span>
					<span></span>
					<span></span>
					<span></span>
				</div>
</div>
				<div class="pupil"><div class="shine"></div></div>
				<div class="eyelid"></div>
			</div>
			<div class="eye righteye">
				<div class="topeyelid">
				<div class="eyelash">
					<span></span>
					<span></span>
					<span></span>
					<span></span>
				</div>
				</div>
				<div class="pupil"><div class="shine"></div></div>
				<div class="eyelid"></div>
			</div>
 		 </div>
		<div id="nose"></div>
  		<div id="mouth"></div>
	</div>
</div>
<br>
<div class="controls">
<button action="">angry</button>
<button action="">happy</button>
<button action="">sad</button>
<button action="">worried</button>
</div>
<script src="app.js"></script>

</html>
